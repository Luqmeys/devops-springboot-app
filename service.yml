apiVersion: v1
kind: Service
metadata:
  name: springboot-app-service
spec:
  type: NodePort
  selector:
    app: springboot-app
  ports:
    - port: 8080          # Internal service port
      targetPort: 8080    # Container port (your Spring Boot app)
      nodePort: 30081     # ← Changed to 30081 (safe & different from 30080)## YAML Template.
---
